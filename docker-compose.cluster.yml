
networks:
  blackhole-network:
    driver: bridge
    name: blackhole-network
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  # Blockchain nodes
  blockchain-data-1:
    driver: local
  blockchain-logs-1:
    driver: local
  blockchain-data-2:
    driver: local
  blockchain-logs-2:
    driver: local
  blockchain-data-3:
    driver: local
  blockchain-logs-3:
    driver: local
  blockchain-data-4:
    driver: local
  blockchain-logs-4:
    driver: local
  blockchain-data-5:
    driver: local
  blockchain-logs-5:
    driver: local
  
  # Dashboard nodes
  dashboard-data-1:
    driver: local
  dashboard-logs-1:
    driver: local
  dashboard-data-2:
    driver: local
  dashboard-logs-2:
    driver: local
  dashboard-data-3:
    driver: local
  dashboard-logs-3:
    driver: local
  dashboard-data-4:
    driver: local
  dashboard-logs-4:
    driver: local
  dashboard-data-5:
    driver: local
  dashboard-logs-5:
    driver: local
  
  # Bridge
  bridge-data:
    driver: local
  bridge-logs:
    driver: local
  
  # Shared services
  postgres-data:
    driver: local
  prometheus-data:
    driver: local

services:
  # ============================================
  # BLOCKCHAIN NODES (5-Node Cluster)
  # ============================================
  
  blockchain-node-1:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: blackhole-node-1
    command: ["./blockchain"]
    ports:
      - "8080:8080"   # Dashboard
      - "8545:8545"   # RPC endpoint
      - "30303:30303" # P2P networking
    environment:
      - NODE_ENV=production
      - DOCKER_MODE=true
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - BLOCKCHAIN_PORT=8080
      - RPC_PORT=8545
      - P2P_PORT=30303
      - DATABASE_PATH=/data/blockchain/blockchain.db
      - LOG_FILE=./logs/blockchain.log
      - PEER_DISCOVERY=${PEER_DISCOVERY:-true}
      - MAX_PEERS=${MAX_PEERS:-50}
      - NODE_ID=blackhole-node-1
    volumes:
      - blockchain-data-1:/data/blockchain
      - blockchain-logs-1:/app/logs
    networks:
      - blackhole-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  blockchain-node-2:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: blackhole-node-2
    command: ["./blockchain"]
    ports:
      - "8081:8080"
      - "8546:8545"
      - "30304:30303"
    environment:
      - NODE_ENV=production
      - DOCKER_MODE=true
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - BLOCKCHAIN_PORT=8080
      - RPC_PORT=8545
      - P2P_PORT=30303
      - DATABASE_PATH=/data/blockchain/blockchain.db
      - LOG_FILE=./logs/blockchain.log
      - PEER_DISCOVERY=${PEER_DISCOVERY:-true}
      - MAX_PEERS=${MAX_PEERS:-50}
      - NODE_ID=blackhole-node-2
    volumes:
      - blockchain-data-2:/data/blockchain
      - blockchain-logs-2:/app/logs
    networks:
      - blackhole-network
