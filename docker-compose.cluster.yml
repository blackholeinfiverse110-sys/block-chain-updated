      blockchain-node-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ============================================
  # DASHBOARD NODES (5-Node Independent Cluster)
  # ============================================

  dashboard-node-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dashboard-node-1
    command: ["./blockchain"]
    ports:
      - "9001:8080"   # Dashboard
      - "9545:8545"   # RPC endpoint
      - "39303:30303" # P2P networking
    environment:
      - NODE_ENV=production
      - DOCKER_MODE=true
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - BLOCKCHAIN_PORT=8080
      - RPC_PORT=8545
      - P2P_PORT=30303
      - DATABASE_PATH=/data/blockchain/blockchain.db
