name: Production Infrastructure CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Validate production deployment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - name: Run Go module validation
        run: |
          go test ./...

      - name: Validate Docker Compose files
        run: |
          docker compose -f deploy/mainnet/docker-compose.yml config

  build:
    name: Build production images
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build blockchain node image
        run: |
          docker buildx build --load \
            --tag blackhole-node:${{ github.sha }} \
            -f deploy/mainnet/Dockerfile.blockchain deploy/mainnet

      - name: Build bridge image
        run: |
          docker buildx build --load \
            --tag blackhole-bridge:${{ github.sha }} \
            -f deploy/mainnet/Dockerfile.bridge deploy/mainnet

      - name: Build wallet image
        run: |
          docker buildx build --load \
            --tag blackhole-wallet:${{ github.sha }} \
            -f services/wallet/Dockerfile services/wallet

  deploy:
    name: Deploy to self-hosted production runner
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on:
      - self-hosted
      - linux
      - x64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Confirm Docker availability
        run: |
          docker version
          docker compose version

      - name: Validate compose config before deploy
        run: |
          docker compose -f deploy/mainnet/docker-compose.yml config

      - name: Deploy production stack
        run: |
          docker compose -f deploy/mainnet/docker-compose.yml pull || true
          docker compose -f deploy/mainnet/docker-compose.yml up -d

      - name: Verify deployment status
        run: |
          docker compose -f deploy/mainnet/docker-compose.yml ps
