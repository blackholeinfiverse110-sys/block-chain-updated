
networks:
  blackhole-network:
    external: true

volumes:
  blockchain-data-1:
    driver: local
  blockchain-logs-1:
    driver: local
  blockchain-data-2:
    driver: local
  blockchain-logs-2:
    driver: local
  blockchain-data-3:
    driver: local
  blockchain-logs-3:
    driver: local
  blockchain-data-4:
    driver: local
  blockchain-logs-4:
    driver: local
  blockchain-data-5:
    driver: local
  blockchain-logs-5:
    driver: local
  blockchain_data:
    name: blackhole-blockchain_blockchain_data
    driver: local

services:
  # BlackHole Blockchain Node 1
  blockchain-node-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blackhole-node-1
    command: ["./blockchain"]
    user: root
    ports:
      - "8080:8080"   # Dashboard
      - "8545:8545"   # RPC endpoint
      - "30303:3000" # P2P networking
    environment:
      - NODE_ENV=production
      - DOCKER_MODE=true
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - BLOCKCHAIN_PORT=8080
      - RPC_PORT=8545
      - P2P_PORT=3000
      - DATABASE_PATH=./data/blockchain.db
      - LOG_FILE=./logs/blockchain.log
      - PEER_DISCOVERY=${PEER_DISCOVERY:-true}
      - MAX_PEERS=${MAX_PEERS:-50}
      - NODE_ID=blackhole-node-1
      - BLOCKCHAIN_IDENTITY_DIR=/app/data/blockchain
    volumes:
      - blockchain-data-1:/app/data
      - blockchain-logs-1:/app/logs
      - blockchain_data:/app/data/blockchain
    networks:
      - blackhole-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # BlackHole Blockchain Node 2
  blockchain-node-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blackhole-node-2
    command: ["./blockchain"]
    user: root
    ports:
      - "8081:8080"   # Dashboard
      - "8546:8545"   # RPC endpoint
      - "30304:3000" # P2P networking
    environment:
      - NODE_ENV=production
      - DOCKER_MODE=true
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - BLOCKCHAIN_PORT=8080
      - RPC_PORT=8545
      - P2P_PORT=3000
      - DATABASE_PATH=./data/blockchain.db
      - LOG_FILE=./logs/blockchain.log
      - PEER_DISCOVERY=${PEER_DISCOVERY:-true}
      - MAX_PEERS=${MAX_PEERS:-50}
      - NODE_ID=blackhole-node-2
    volumes:
      - blockchain-data-2:/app/data
      - blockchain-logs-2:/app/logs
    networks:
      - blackhole-network
    restart: unless-stopped
    depends_on:
      blockchain-node-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

