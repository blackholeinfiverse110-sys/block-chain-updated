  # ============================================
  # BRIDGE SERVICE
  # ============================================

  bridge-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blackhole-bridge
    command: ["./bridge-sdk"]
    ports:
      - "8084:8084"   # Bridge dashboard & API
      - "9090:9090"   # gRPC & Relay server
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - PORT=8084
      - RELAY_PORT=9090
      - DATABASE_PATH=/app/data/bridge.db
      - LOG_FILE=/app/logs/bridge.log
      - BLACKHOLE_RPC=http://blockchain-node-1:8080
      - ETHEREUM_RPC=${ETHEREUM_RPC:-wss://eth-mainnet.ws.alchemyapi.io/v2/demo}
      - SOLANA_RPC=${SOLANA_RPC:-https://api.mainnet-beta.solana.com}
      - REPLAY_PROTECTION_ENABLED=${REPLAY_PROTECTION_ENABLED:-true}
      - CIRCUIT_BREAKER_ENABLED=${CIRCUIT_BREAKER_ENABLED:-true}
      - MAX_RETRIES=${MAX_RETRIES:-5}
      - RETRY_DELAY=${RETRY_DELAY:-5000}
      - BATCH_SIZE=${BATCH_SIZE:-100}
    volumes:
      - bridge-data:/app/data
      - bridge-logs:/app/logs
    networks:
      - blackhole-network
    depends_on:
      blockchain-node-1:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ============================================
  # MONITORING SERVICES
  # ============================================

  prometheus:
    image: prom/prometheus:latest
    container_name: blackhole-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    environment:
      - NODE_ENV=production
    networks:
      - blackhole-network
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'

  postgres:
    image: postgres:15-alpine
    container_name: blackhole-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-blackhole}
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password123}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - blackhole-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
