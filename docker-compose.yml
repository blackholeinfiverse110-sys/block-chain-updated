

networks:
  blackhole-network:
    external: true
    name: blackhole-network

volumes:
  blockchain-data-1:
    driver: local
  blockchain-logs-1:
    driver: local
  blockchain-data-2:
    driver: local
  blockchain-logs-2:
    driver: local
  blockchain-data-3:
    driver: local
  blockchain-logs-3:
    driver: local
  blockchain-data-4:
    driver: local
  blockchain-logs-4:
    driver: local
  blockchain-data-5:
    driver: local
  blockchain-logs-5:
    driver: local
  bridge-data:
    driver: local
  bridge-logs:
    driver: local
  # Persistent blockchain identity/data mount point used by the node and bridge
  blockchain_data:
    name: blackhole-blockchain_blockchain_data
    driver: local
  wallet-go-cache:
    driver: local

services:
  # BlackHole Blockchain Node 1
  blockchain-node-1:
    build:
      context: .
      dockerfile: deploy/mainnet/Dockerfile.blockchain
    container_name: blackhole-node-1
    command: ["./blockchain"]
    ports:
      - "8080:8080"   # Dashboard
      - "8545:8545"   # RPC endpoint
      - "30303:3000" # P2P networking
    environment:
      - NODE_ENV=production
      - DOCKER_MODE=true
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - BLOCKCHAIN_PORT=8080
      - RPC_PORT=8545
      - P2P_PORT=3000
      - DATABASE_PATH=./data/blockchain.db
      - LOG_FILE=./logs/blockchain.log
      - PEER_DISCOVERY=${PEER_DISCOVERY:-true}
      - MAX_PEERS=${MAX_PEERS:-50}
      - NODE_ID=blackhole-node-1
      - BLOCKCHAIN_IDENTITY_DIR=/data/blockchain
    volumes:
      - blockchain-data-1:/app/data
      - blockchain-logs-1:/app/logs
      - blockchain_data:/data/blockchain
    networks:
      - blackhole-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # BlackHole Blockchain Node 2
  blockchain-node-2:
    build:
      context: .
      dockerfile: deploy/mainnet/Dockerfile.blockchain
    container_name: blackhole-node-2
    command: ["./blockchain"]
    ports:
      - "8081:8080"   # Dashboard
      - "8546:8545"   # RPC endpoint
      - "30304:3000" # P2P networking
    environment:
      - NODE_ENV=production
      - DOCKER_MODE=true
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - BLOCKCHAIN_PORT=8080
      - RPC_PORT=8545
      - P2P_PORT=3000
      - DATABASE_PATH=./data/blockchain.db
      - LOG_FILE=./logs/blockchain.log
      - PEER_DISCOVERY=${PEER_DISCOVERY:-true}
      - MAX_PEERS=${MAX_PEERS:-50}
      - NODE_ID=blackhole-node-2
    volumes:
      - blockchain-data-2:/app/data
      - blockchain-logs-2:/app/logs
    networks:
      - blackhole-network
    restart: unless-stopped
    depends_on:
      blockchain-node-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # BlackHole Blockchain Node 3
  blockchain-node-3:
    build:
      context: .
      dockerfile: deploy/mainnet/Dockerfile.blockchain
    container_name: blackhole-node-3
    command: ["./blockchain"]
    ports:
      - "8082:8080"   # Dashboard
      - "8547:8545"   # RPC endpoint
      - "30305:3000" # P2P networking
    environment:
      - NODE_ENV=production
      - DOCKER_MODE=true
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - BLOCKCHAIN_PORT=8080
      - RPC_PORT=8545
      - P2P_PORT=3000
      - DATABASE_PATH=./data/blockchain.db
      - LOG_FILE=./logs/blockchain.log
      - PEER_DISCOVERY=${PEER_DISCOVERY:-true}
      - MAX_PEERS=${MAX_PEERS:-50}
      - NODE_ID=blackhole-node-3
    volumes:
      - blockchain-data-3:/app/data
      - blockchain-logs-3:/app/logs
    networks:
      - blackhole-network
    restart: unless-stopped
    depends_on:
      blockchain-node-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # BlackHole Blockchain Node 4
  blockchain-node-4:
    build:
      context: .
      dockerfile: deploy/mainnet/Dockerfile.blockchain
    container_name: blackhole-node-4
    command: ["./blockchain"]
    ports:
      - "8083:8080"   # Dashboard
      - "8548:8545"   # RPC endpoint
      - "30306:3000" # P2P networking
    environment:
      - NODE_ENV=production
      - DOCKER_MODE=true
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - BLOCKCHAIN_PORT=8080
      - RPC_PORT=8545
      - P2P_PORT=3000
      - DATABASE_PATH=./data/blockchain.db
      - LOG_FILE=./logs/blockchain.log
      - PEER_DISCOVERY=${PEER_DISCOVERY:-true}
      - MAX_PEERS=${MAX_PEERS:-50}
      - NODE_ID=blackhole-node-4
    volumes:
      - blockchain-data-4:/app/data
      - blockchain-logs-4:/app/logs
    networks:
      - blackhole-network
    restart: unless-stopped
    depends_on:
      blockchain-node-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # BlackHole Blockchain Node 5
  blockchain-node-5:
    build:
      context: .
      dockerfile: deploy/mainnet/Dockerfile.blockchain
    container_name: blackhole-node-5
    command: ["./blockchain"]
    ports:
      - "8085:8080"   # Dashboard
      - "8549:8545"   # RPC endpoint
      - "30307:3000" # P2P networking
    environment:
      - NODE_ENV=production
      - DOCKER_MODE=true
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - BLOCKCHAIN_PORT=8080
      - RPC_PORT=8545
      - P2P_PORT=3000
      - DATABASE_PATH=./data/blockchain.db
      - LOG_FILE=./logs/blockchain.log
      - PEER_DISCOVERY=${PEER_DISCOVERY:-true}
      - MAX_PEERS=${MAX_PEERS:-50}
      - NODE_ID=blackhole-node-5
    volumes:
      - blockchain-data-5:/app/data
      - blockchain-logs-5:/app/logs
    networks:
      - blackhole-network
    restart: unless-stopped
    depends_on:
      blockchain-node-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Bridge SDK Service
  bridge:
    build:
      context: ./bridge-sdk
      dockerfile: Dockerfile.bridge
    container_name: blackhole-bridge
    command: ["./bridge-sdk"]
    ports:
      - "8084:8084"   # Bridge dashboard & API
      - "9090:9090"   # gRPC & Relay server
    environment:
      - DOCKER_MODE=true
      - BLOCKCHAIN_API_URL=http://blackhole-node-1:8080
      - WALLET_API_URL=http://blackhole-wallet:9000
      - NODE_ENV=production
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - PORT=8084
      - RELAY_PORT=9090
      - DATABASE_PATH=/app/data/bridge_v4.db
      - LOG_FILE=/app/logs/bridge.log
      # Optional: expose identity dir path for future use
      - BLOCKCHAIN_IDENTITY_DIR=/data/blockchain
    volumes:
      - bridge-data:/app/data
      - bridge-logs:/app/logs
      - blockchain_data:/data/blockchain:ro
    networks:
      - blackhole-network
    depends_on:
      blockchain-node-1:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  wallet:
    image: golang:1.23-alpine
    container_name: blackhole-wallet
    working_dir: /workspace
    volumes:
      - .:/workspace:ro
      - wallet-go-cache:/go
    environment:
      - DOCKER_MODE=true
      - BLOCKCHAIN_API_URL=http://blackhole-node-1:8080
      - BRIDGE_API_URL=http://blackhole-bridge:8084
    depends_on:
      blockchain-node-1:
        condition: service_healthy
      bridge:
        condition: service_healthy
    networks:
      - blackhole-network
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/status"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 5s
    entrypoint: ["/bin/sh","-lc","tr -d '\r' < /workspace/docker/wallet-entrypoint.sh > /tmp/wallet-entrypoint.sh && /bin/sh /tmp/wallet-entrypoint.sh"]
